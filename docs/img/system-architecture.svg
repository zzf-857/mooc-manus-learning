<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 820">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&amp;display=swap');
    text { font-family: 'JetBrains Mono', 'Noto Sans SC', 'PingFang SC', sans-serif; }
    .title { fill: #f8fafc; font-size: 22px; font-weight: 700; }
    .subtitle { fill: #94a3b8; font-size: 10px; }
    .name { fill: #f8fafc; font-size: 13px; font-weight: 600; text-anchor: middle; }
    .desc { fill: #94a3b8; font-size: 9px; text-anchor: middle; }
    .label { fill: #cbd5e1; font-size: 8px; text-anchor: middle; }
    .region { fill: #fbbf24; font-size: 10px; font-weight: 600; }
  </style>
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#64748b"/>
    </marker>
    <marker id="arrow-cyan" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#22d3ee"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0,10 3.5,0 7" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="1400" height="820" fill="#0f172a"/>
  <rect width="1400" height="820" fill="url(#grid)"/>

  <text x="32" y="40" class="title">MoocManus 全栈系统架构</text>
  <text x="32" y="61" class="subtitle">默认本地模式：Nginx 单入口 · FastAPI 编排 · 隔离沙箱 · PostgreSQL / Redis / 本地文件卷</text>

  <rect x="155" y="92" width="1070" height="625" rx="16" fill="none" stroke="#fbbf24" stroke-width="1.2" stroke-dasharray="10,5"/>
  <text x="172" y="113" class="region">Docker 内部网络 · manus-network（默认不向局域网暴露内部服务）</text>

  <rect x="1245" y="135" width="130" height="500" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="1310" y="157" fill="#94a3b8" font-size="9" font-weight="600" text-anchor="middle">外部能力</text>

  <!-- Connections are painted before boxes. -->
  <path d="M90 225 L205 225" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <path d="M365 225 L445 225" fill="none" stroke="#22d3ee" stroke-width="2" marker-end="url(#arrow-cyan)"/>
  <path d="M285 260 L285 335 L665 335" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M745 375 L745 455" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M825 335 L900 335 L900 455" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M665 350 L550 350 L550 480 L445 480" fill="none" stroke="#fb923c" stroke-width="1.7" marker-end="url(#arrow-orange)"/>
  <path d="M825 320 L995 320 L995 480" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M825 305 L1245 245" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M825 325 L1245 385" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>
  <path d="M825 345 L1245 525" fill="none" stroke="#64748b" stroke-width="1.3" marker-end="url(#arrow)"/>

  <text x="405" y="214" class="label">页面 / 静态资源</text>
  <text x="480" y="324" class="label">/api · REST · SSE · WebSocket</text>
  <text x="520" y="468" class="label">Shell · 文件 · 浏览器 · VNC</text>

  <!-- Opaque masks and component boxes. -->
  <g>
    <rect x="20" y="190" width="140" height="70" rx="8" fill="#0f172a"/>
    <rect x="20" y="190" width="140" height="70" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.6"/>
    <text x="90" y="220" class="name">浏览器</text>
    <text x="90" y="239" class="desc">用户 / 开发者</text>
  </g>

  <g>
    <rect x="205" y="190" width="160" height="70" rx="8" fill="#0f172a"/>
    <rect x="205" y="190" width="160" height="70" rx="8" fill="rgba(120,53,15,0.3)" stroke="#fbbf24" stroke-width="1.6"/>
    <text x="285" y="220" class="name">Nginx 网关</text>
    <text x="285" y="239" class="desc">唯一宿主机入口 · 反向代理</text>
  </g>

  <g>
    <rect x="445" y="190" width="160" height="70" rx="8" fill="#0f172a"/>
    <rect x="445" y="190" width="160" height="70" rx="8" fill="rgba(8,51,68,0.4)" stroke="#22d3ee" stroke-width="1.6"/>
    <text x="525" y="220" class="name">Next.js 前端</text>
    <text x="525" y="239" class="desc">React · SSE · noVNC</text>
  </g>

  <g>
    <rect x="665" y="285" width="160" height="90" rx="8" fill="#0f172a"/>
    <rect x="665" y="285" width="160" height="90" rx="8" fill="rgba(6,78,59,0.4)" stroke="#34d399" stroke-width="1.8"/>
    <text x="745" y="316" class="name">FastAPI 后端</text>
    <text x="745" y="337" class="desc">应用层 / 领域层 / 基础设施层</text>
    <text x="745" y="353" class="desc">Planner · ReAct · 工具 · 会话</text>
  </g>

  <g>
    <rect x="205" y="440" width="240" height="120" rx="10" fill="#0f172a"/>
    <rect x="205" y="440" width="240" height="120" rx="10" fill="rgba(120,53,15,0.3)" stroke="#fb923c" stroke-width="1.7"/>
    <text x="325" y="470" class="name">Sandbox 沙箱</text>
    <text x="325" y="492" class="desc">FastAPI :8080 · Chromium CDP :9222</text>
    <text x="325" y="510" class="desc">Xvfb · x11vnc · Websockify :5901</text>
    <text x="325" y="528" class="desc">Supervisor · 资源限制</text>
    <text x="325" y="546" fill="#fb7185" font-size="8" text-anchor="middle">RCE 边界：仅容器内网可达</text>
  </g>

  <g transform="translate(685,455)">
    <rect x="0" y="10" width="120" height="58" fill="#0f172a"/>
    <ellipse cx="60" cy="10" rx="60" ry="12" fill="#0f172a"/>
    <ellipse cx="60" cy="68" rx="60" ry="12" fill="#0f172a"/>
    <rect x="0" y="10" width="120" height="58" fill="rgba(76,29,149,0.4)"/>
    <ellipse cx="60" cy="10" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <ellipse cx="60" cy="68" rx="60" ry="12" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="0" y1="10" x2="0" y2="68" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="120" y1="10" x2="120" y2="68" stroke="#a78bfa" stroke-width="1.5"/>
    <text x="60" y="43" class="name">PostgreSQL</text>
  </g>

  <g>
    <rect x="845" y="455" width="130" height="75" rx="8" fill="#0f172a"/>
    <rect x="845" y="455" width="130" height="75" rx="8" fill="rgba(251,146,60,0.3)" stroke="#fb923c" stroke-width="1.6"/>
    <text x="910" y="486" class="name">Redis</text>
    <text x="910" y="506" class="desc">任务输入 / 输出 Stream</text>
  </g>

  <g>
    <rect x="995" y="455" width="155" height="75" rx="8" fill="#0f172a"/>
    <rect x="995" y="455" width="155" height="75" rx="8" fill="rgba(76,29,149,0.4)" stroke="#a78bfa" stroke-width="1.6"/>
    <text x="1072" y="486" class="name">本地文件卷</text>
    <text x="1072" y="506" class="desc">默认文件存储</text>
  </g>

  <g>
    <rect x="1260" y="210" width="100" height="70" rx="8" fill="#0f172a"/>
    <rect x="1260" y="210" width="100" height="70" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="1310" y="240" class="name">LLM</text>
    <text x="1310" y="260" class="desc">OpenAI 兼容接口</text>
  </g>
  <g>
    <rect x="1260" y="350" width="100" height="70" rx="8" fill="#0f172a"/>
    <rect x="1260" y="350" width="100" height="70" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="1310" y="380" class="name">MCP</text>
    <text x="1310" y="400" class="desc">远程工具</text>
  </g>
  <g>
    <rect x="1260" y="490" width="100" height="70" rx="8" fill="#0f172a"/>
    <rect x="1260" y="490" width="100" height="70" rx="8" fill="rgba(30,41,59,0.5)" stroke="#94a3b8" stroke-width="1.4"/>
    <text x="1310" y="520" class="name">A2A</text>
    <text x="1310" y="540" class="desc">远程 Agent</text>
  </g>

  <g transform="translate(185,755)">
    <circle cx="0" cy="0" r="5" fill="#22d3ee"/><text x="12" y="4" fill="#cbd5e1" font-size="9">用户界面 / HTTP</text>
    <circle cx="180" cy="0" r="5" fill="#34d399"/><text x="192" y="4" fill="#cbd5e1" font-size="9">后端编排</text>
    <circle cx="330" cy="0" r="5" fill="#a78bfa"/><text x="342" y="4" fill="#cbd5e1" font-size="9">持久化</text>
    <circle cx="455" cy="0" r="5" fill="#fb923c"/><text x="467" y="4" fill="#cbd5e1" font-size="9">隔离 / 消息</text>
    <circle cx="610" cy="0" r="5" fill="#94a3b8"/><text x="622" y="4" fill="#cbd5e1" font-size="9">外部能力</text>
  </g>
</svg>
