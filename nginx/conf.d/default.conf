# SSL 配置（如需启用 HTTPS，取消以下注释并配置证书路径）
# ============================================================
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }
#
# server {
#     listen 443 ssl;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/nginx/ssl/fullchain.pem;
#     ssl_certificate_key /etc/nginx/ssl/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     # ... 以下 location 配置与 HTTP 相同 ...
# }

upstream ui_backend {
    server manus-ui:3000;
}

upstream api_backend {
    server manus-api:8000;
}

server {
    listen 80;
    server_name _;

    # ----------------------------------------------------------
    # API 接口代理（含 WebSocket / SSE 支持）
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;

        # WebSocket 支持（VNC 等）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 标准代理头
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接支持
        proxy_buffering off;
        proxy_cache     off;

        # 超时设置（WebSocket 与 SSE 需要长超时）
        proxy_read_timeout    86400s;
        proxy_send_timeout    86400s;
        proxy_connect_timeout 60s;
    }

    # ----------------------------------------------------------
    # 前端 UI 代理
    # ----------------------------------------------------------
    location / {
        proxy_pass http://ui_backend;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR WebSocket（开发调试用）
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
